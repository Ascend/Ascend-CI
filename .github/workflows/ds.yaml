name: ds_test

on:
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: choice
        options:
          - self-hosted
          - linux-arm64-npu-1
          - linux-arm64-npu-2
          - linux-arm64-npu-4
        default: 'linux-arm64-npu-1'
        description: 'Runner to run on'
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    paths:
      - '.github/workflows/ds.yaml'
  push:
    paths:
      - '.github/workflows/ds.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - id: set
        run: |
          echo "runner=${{ github.event.inputs.runner || 'linux-arm64-npu-1' }}" >> $GITHUB_OUTPUT

  unit-tests:
    runs-on: ${{ needs.prepare.outputs.runner }}
    container:
      image: ascendai/cann:latest

    steps:
      - uses: actions/checkout@v4

      - name: Show NPU info
        run: |
          npu-smi info
        
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            git gcc g++ make cmake ninja-build python-is-python3 python3-pip

      - name: Config mirrors
        run: |
          sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple

      - name: Install pytorch
        run: |
          pip install torch torch_npu==2.7.1rc1 torchvision torchao --extra-index-url https://download.pytorch.org/whl/nightly/cpu
          python -c "import torch; print('torch:', torch.__version__, torch)"
          python -c "import torch; print('NPU available:', torch.npu.is_available())"


      - name: Checkout transformers
        uses: actions/checkout@v4
        with:
          repository: huggingface/transformers
          path: transformers

      - name: Install transformers
        working-directory: transformers
        run: |
          git rev-parse --short HEAD
          pip install .

      - name: Install deepspeed
        run: |
          pip install .[dev,1bit,autotuning]
          ds_report

      - name: Python environment
        run: |
          pip list

      - name: Unit tests
        run: |
          unset TORCH_CUDA_ARCH_LIST # only jit compile for current arch
          cd tests
          pytest $PYTEST_OPTS --forked -n 8 unit/
          pytest $PYTEST_OPTS --forked -m 'sequential' unit/

