name: Test llamacpp

on:
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: choice
        options:
          - npu-arm64
          - linux-arm64-npu-0
          - linux-arm64-npu-1
          - linux-arm64-npu-2
          - linux-arm64-npu-4
        default: "linux-arm64-npu-1"
        description: "The runner selected to run on"
      image:
        required: true
        type: choice
        options:
          - ascendai/cann:7.0.1-910b-ubuntu22.04-py3.8
          - ascendai/cann:8.0.0-910b-ubuntu22.04-py3.10
          - ascendai/cann:latest
        default: "ascendai/cann:latest"
        description: "The docker image which will be loaded"
    
  pull_request:
    branches:
      - "llamacpp"
    paths:
      - ".github/workflows/llamacpp2.yml"
  push:
    branches:
      - "llamacpp"
    paths:
      - ".github/workflows/llamacpp2.yml"

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set.outputs.runner }}
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Set outputs
        id: set
        run: |
          echo "runner=${{ inputs.runner  || 'linux-arm64-npu-1' }}" >> $GITHUB_OUTPUT
          echo "image=${{ inputs.image  || 'ascendai/cann:latest' }}" >> $GITHUB_OUTPUT

  benchmark:
    name: Build llama.cpp on OpenEuler for Arm64
    needs: prepare
    strategy:
      matrix:
        arch: [x86, aarch64]
        device:
          - 'ascend910b3'
        build:
          - 'Release'
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    container:
      image: ${{ needs.prepare.outputs.image }}
      env:
        HF_ENDPOINT: https://hf-mirror.com

    steps:
      - name: Show NPU info
        run: |
          npu-smi info

      - name: Config mirrors
        run: |
          sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple

      - name: Install system dependencies
        run: |
          apt-get update -y && \
          apt-get install -y \
              git gcc g++ make cmake ninja-build curl \
              libgl1 libglib2.0-0 libsndfile1 \
              python-is-python3 python3-pip

      # See: https://github.com/actions/checkout/issues/363#issuecomment-1915075699
      # See: https://github.com/hunshcn/gh-proxy/issues/28#issuecomment-773769630
      - name: Config git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout benchmark
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          path: llama.cpp

      - name: Install torch
        run: |
          pip install torch torch_npu==2.7.1rc1

      - name: List torch version
        id: list-torch-version
        shell: bash
        run: |
          torch_version=$(python -c "from importlib.metadata import version;print(version('torch'))")
          echo "torch-version=${torch_version}" >> $GITHUB_OUTPUT

      - name: Build llama.cpp
        working-directory: llama.cpp
        run: |
          export LD_LIBRARY_PATH=${ASCEND_TOOLKIT_HOME}/lib64:${ASCEND_TOOLKIT_HOME}/$(uname -m)-linux/devlib/:${LD_LIBRARY_PATH}
  
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
            -DGGML_CANN=on \
            -DSOC_TYPE=${{ matrix.device }}
          cmake --build build -j $(nproc)
    
      - name: test backend ops
        working-directory: llama.cpp/build
        run: |
          ./test-backend-ops
    
      - name: Download model
        run: |
          mkdir -p llama.cpp/models/Qwen2.5-0.5B
          wget -q https://hf-mirror.com/datasets/Ascend/Qwen2.5-0.5B/ggml-model-q4_0.bin -O llama.cpp/models/Qwen2.5-0.5B/ggml-model-q4_0.bin

      - name: Accuracy test
        working-directory: llama.cpp/build
        run: |
          ./test-accuracy --model ../models/7B/ggml-model-q4_0.bin --backend cann --soc-type ${{ matrix.device }} --threads 1

      - name: performance testing
        working-directory: llama.cpp/build
        run: |
          ./test-performance --model ../models/7B/ggml-model-q4_0.bin --backend cann --soc-type ${{ matrix.device }} --threads 1
    
      

