name: onnx runtime build and test

on:
  push:
    branches:
      - main
      - onnx
    paths:
      - '.github/workflows/onnxruntime.yml'
  pull_request:
    branches:
      - main
      - onnx
    paths:
      - '.github/workflows/onnxruntime.yml'
  schedule:
    - cron: '0 12 * * *'
  issue_comment:
    types: [created]

jobs:
  build-and-test:
    name: Build and test onnx runtime from source
    if: ${{ github.repository_owner == 'Ascend' && (contains(github.event.comment.body, 'recheck') || github.event_name == 'schedule' || github.event_name == 'push') }}
    runs-on: linux-arm64-npu-1
    # container:
    #   image: swr.cn-north-4.myhuaweicloud.com/bachelor/manylinux_2_28-py311-cann8_2-aarch64:latest
    #   options: --entrypoint /bin/sh

    # steps:
    #   - name: Show NPU info
    #     run: |
    #       npu-smi info

    #   # - name: Config mirrors
    #   #   run: |
    #   #     sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
    #   #     pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple

    #   # - name: Install system dependencies
    #   #   run: |
    #   #     apt-get update
    #   #     apt-get install -y \
    #   #         gcc g++ ninja-build
    #   #     pip install --upgrade pip
    #   #     pip install make cmake

    #   - name: Checkout onnx
    #     uses: actions/checkout@v4
    #     with:
    #       repository: microsoft/onnxruntime
    #       path: onnxruntime

    #   - name: Build and test onnx runtime
    #     working-directory: onnxruntime
    #     run: |
    #       source /usr/local/Ascend/ascend-toolkit/set_env.sh
    #       ./build.sh --allow_running_as_root --config RelWithDebInfo --build_shared_lib --parallel --use_cann --build_wheel --skip_tests
    steps:
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: test docker
        run: |
          ./script/test_docker_robust.sh

      - name: Start Docker service (robust method with fallbacks)
        run: |
          # Robust Docker startup with multiple fallbacks and error handling
          echo "Attempting to start Docker service..."
          
          # Method 1: Try systemctl if available and working
          if command -v systemctl > /dev/null 2>&1; then
            echo "Trying systemctl (method 1)..."
            if sudo systemctl start docker > /dev/null 2>&1; then
              echo "✓ Docker started successfully with systemctl"
              exit 0
            else
              echo "✗ systemctl failed, trying next method"
            fi
          fi
          
          # Method 2: Try service command if available
          if command -v service > /dev/null 2>&1; then
            echo "Trying service command (method 2)..."
            if sudo service docker start > /dev/null 2>&1; then
              echo "✓ Docker started successfully with service command"
              exit 0
            else
              echo "✗ service command failed, trying next method"
            fi
          fi
          
          # Method 3: Start Docker directly with dockerd (most reliable fallback)
          echo "Trying direct dockerd start (method 3)..."
          if sudo dockerd > /dev/null 2>&1 &; then
            echo "✓ Docker daemon started directly with dockerd"
            # Wait for daemon to initialize
            sleep 5
            exit 0
          else
            echo "✗ All methods failed to start Docker"
            exit 1
          fi

      - name: Verify Docker service is running
        run: |
          # Wait for Docker daemon to initialize
          for i in {1..10}; do
            if sudo docker info > /dev/null 2>&1; then
              echo "Docker daemon is running"
              exit 0
            fi
            echo "Waiting for Docker daemon to start... ($i/10)"
            sleep 2
          done
          echo "Docker daemon failed to start after 20 seconds"
          exit 1

      - name: Checkout onnx
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          path: onnxruntime

      - name: Build and test onnxruntime in container
        run: |
          sudo docker run --rm \
            --user root \
            -v "$PWD:/workspace" \
            -w /workspace/onnxruntime \
            swr.cn-north-4.myhuaweicloud.com/bachelor/manylinux_2_28-py311-cann8_2-aarch64:latest \
            bash -lc '
              set -euxo pipefail

              echo "=== NPU info ==="
              npu-smi info || true

              echo "=== Source Ascend env ==="
              source /usr/local/Ascend/ascend-toolkit/set_env.sh

              echo "ASCEND_TOOLKIT_HOME=$ASCEND_TOOLKIT_HOME"

              echo "=== Build onnxruntime ==="
              ./build.sh \
                --allow_running_as_root \
                --config RelWithDebInfo \
                --build_shared_lib \
                --parallel \
                --use_cann \
                --build_wheel \
                --skip_tests
            '