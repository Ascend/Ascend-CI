name: onnx runtime build and test

on:
  push:
    branches:
      - main
      - onnx
    paths:
      - '.github/workflows/onnxruntime.yml'
  pull_request:
    branches:
      - main
      - onnx
    paths:
      - '.github/workflows/onnxruntime.yml'
  schedule:
    - cron: '0 12 * * *'
  issue_comment:
    types: [created]

jobs:
  build-and-test:
    name: Build and test onnx runtime from source
    if: ${{ github.repository_owner == 'Ascend' && (contains(github.event.comment.body, 'recheck') || github.event_name == 'schedule' || github.event_name == 'push') }}
    runs-on: linux-arm64-npu-2
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:latest
      options: --entrypoint /bin/sh

    steps:
      - name: Show NPU info
        run: |
          npu-smi info
          echo $(nproc)

      - name: Config mirrors
        run: |
          sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
              gcc g++ ninja-build \
              libssl-dev \
              libffi-dev \
              libbz2-dev \
              zlib1g-dev \
              libreadline-dev \
              libsqlite3-dev \
              libeigen3-dev \
              libre2-dev

          # Install abseil-cpp from source since there's no official apt package
          git clone https://github.com/abseil/abseil-cpp.git --depth 1 --branch 20250814.0 /tmp/abseil-cpp
          mkdir -p /tmp/abseil-cpp/build
          cd /tmp/abseil-cpp/build
          cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_POSITION_INDEPENDENT_CODE=ON ..
          make -j$(nproc)
          make install
          ldconfig

          pip install --upgrade pip
          pip install make cmake twine \
            packaging \
            wheel \
            numpy==1.24.0 \
            decorator \
            attrs \
            flatbuffers \
            protobuf==3.20.3

      - name: Checkout onnx
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          path: onnxruntime
          depth: 1

      - name: Build and test onnx runtime
        working-directory: onnxruntime
        run: |
          ./build.sh --allow_running_as_root \
            --config RelWithDebInfo \
            --build_shared_lib \
            --parallel $(nproc) \
            --use_cann \
            --build_wheel \
            --skip_tests \
            --cmake_extra_defines "Eigen3_ROOT=/usr/include/eigen3" \
            --cmake_extra_defines "re2_ROOT=/usr/include/re2" \
            --cmake_extra_defines "absl_DIR=/usr/local/lib/cmake/absl" \
            --cmake_extra_defines "CMAKE_CXX_FLAGS=-fno-var-tracking-assignments -O2"
