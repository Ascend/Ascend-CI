name: onnx runtime build and test

on:
  workflow_dispatch:
    inputs:
      runner:
        required: true
        type: choice
        options:
          - self-hosted
          - linux-aarch64-a2-1
          - linux-aarch64-a2-2
          - linux-aarch64-a2-4
          - linux-aarch64-a2-8
        default: 'linux-aarch64-a2-1'
        description: 'Runner to run on'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/onnxruntime.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/onnxruntime.yml'
  schedule:
    - cron: '0 12 * * *'
  issue_comment:
    types: [created]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - name: Set runner
        id: set
        run: |
          echo "runner=${{ github.event.inputs.runner || 'linux-aarch64-a2-1' }}" >> $GITHUB_OUTPUT

  build-and-test:
    name: Build and test onnx runtime from source 
    needs: prepare
    if: ${{ github.repository_owner == 'Ascend' && (contains(github.event.comment.body, 'recheck') || github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ${{ needs.prepare.outputs.runner }}
    strategy:
      matrix:
        image:
          - 8.5.0-910b-ubuntu22.04-py3.11
          - 8.3.rc1-910b-ubuntu22.04-py3.11
      fail-fast: false
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:${{ matrix.image }}
      options: --entrypoint /bin/sh
      env:
        LANG: en_US.UTF-8
        LC_ALL: en_US.UTF-8
        # 排除 CannExecutionProviderTest：NPU 在容器中执行 aclopCompileAndExecute 时 ACL_ERROR_FAILURE
        GTEST_FILTER: "-CannExecutionProviderTest.FunctionTest"

    steps:
      - name: Show NPU info
        run: |
          npu-smi info
          echo "ASCEND_TOOLKIT_HOME: $ASCEND_TOOLKIT_HOME"
          cat $ASCEND_TOOLKIT_HOME/set_env.sh || true
          cat $ASCEND_TOOLKIT_HOME/cann/version.info || cat $ASCEND_TOOLKIT_HOME/ascend-toolkit/version.info || true

      - name: Config mirrors
        run: |
          sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
              gcc g++ git ninja-build \
              libssl-dev \
              libffi-dev \
              libbz2-dev \
              zlib1g-dev \
              libreadline-dev \
              libsqlite3-dev \
              libeigen3-dev \
              libre2-dev \
              locales

          # 修复 StringNormalizer 测试：安装并配置 en_US.UTF-8 locale
          locale-gen en_US.UTF-8
          update-locale LANG=en_US.UTF-8

          pip install --upgrade pip
          pip install make cmake twine \
            packaging \
            wheel \
            numpy==1.24.0 \
            decorator \
            attrs \
            flatbuffers \
            protobuf==3.20.3
        
      - name: List python packages
        run: |
          pip list

      - name: Checkout onnx
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          path: onnxruntime
          fetch-depth: 1

      - name: Build and test onnx runtime
        working-directory: onnxruntime
        run: |
          # 获取并检出上游 PR 27091 到本地分支 pr-123
          git fetch origin pull/27091/head:pr-123
          git checkout pr-123
          ./build.sh --allow_running_as_root \
            --config RelWithDebInfo \
            --build_shared_lib \
            --parallel $(nproc) \
            --use_cann \
            --build_wheel \
            --skip_tests \
            --cmake_extra_defines "CMAKE_CXX_FLAGS=-fno-var-tracking-assignments -O2"

            cd build/Linux/RelWithDebInfo
            ./onnxruntime_provider_test --gtest_filter=-CannExecutionProviderTest.FunctionTest
      
      - name: Rerun failed tests with verbose output
        working-directory: onnxruntime/build/Linux/RelWithDebInfo
        if: failure()
        run: |
          ctest --rerun-failed --output-on-failure 2>&1 | tee failed_test_output.log
          cat Testing/Temporary/LastTest.log

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.image }}
          path: |
            onnxruntime/build/Linux/RelWithDebInfo/Testing/Temporary/LastTest.log
            onnxruntime/build/Linux/RelWithDebInfo/failed_test_output.log